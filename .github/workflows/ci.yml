name: CI

# The "four green checks" that define done for this repo: lint, unit tests,
# production build, and the end-to-end flow. Runs on every push to main and on
# every pull request.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Unit tests (Vitest)
        run: npm test

      - name: Production build
        run: npm run build

      - name: End-to-end test (Playwright)
        run: npm run test:e2e

      - name: Dependency audit (advisory)
        run: npm audit --audit-level=high || true
